<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Última Hora | News LATAM</title>

<style>

body{
    margin:0;
    background:#111;
    font-family:Arial, Helvetica, sans-serif;
}

#ultimahora{

    width:320px;

    background:#0d0d0d;

    border-top:4px solid #c8102e;

    padding:20px;

    color:white;

    box-shadow:0 0 8px rgba(0,0,0,.4);

}

.titulo{

font-size:24px;

font-weight:bold;

letter-spacing:2px;

margin-bottom:15px;

color:#c8102e;

}

.noticia{

padding-bottom:15px;

margin-bottom:15px;

border-bottom:1px solid #333;

}

.noticia a{

color:white;

text-decoration:none;

font-size:15px;

line-height:1.4;

}

.noticia a:hover{

color:#c8102e;

}

.fecha{

margin-top:5px;

font-size:11px;

color:#999;

}

.actualizado{

margin-top:15px;

font-size:12px;

color:#888;

}

</style>

</head>

<body>


<section id="ultimahora">

<div class="titulo">

ÚLTIMA HORA

</div>


<div id="contenedor">

Cargando noticias...

</div>


<div class="actualizado" id="hora"></div>


</section>



<script>

const feed =

'https://feeds.bbci.co.uk/mundo/rss.xml';


const api =

'https://api.rss2json.com/v1/api.json?rss_url='

+ encodeURIComponent(feed);



fetch(api)

.then(r=>r.json())

.then(data=>{


let html='';



data.items.slice(0,5).forEach(item=>{


html += `


<div class="noticia">


<a href="${item.link}"

target="_blank">


${item.title}


</a>


<div class="fecha">


${new Date(item.pubDate)

.toLocaleDateString('es-ES')}


</div>


</div>


`;



});



document.getElementById("contenedor")

.innerHTML=html;



document.getElementById("hora")

.innerHTML=


'Actualizado: '

+ new Date().toLocaleString('es-CR');



})


.catch(()=>{


document.getElementById("contenedor")

.innerHTML=


'No fue posible cargar noticias.';


});


</script>


</body>

</html>
