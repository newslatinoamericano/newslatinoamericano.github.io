<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>News LATAM Studio</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
max-width:900px;
margin:auto;
padding:20px;
background:#f5f5f5;
}

h1{
color:#C8102E;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input,select,textarea{

width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:4px;

}

textarea{

height:250px;

}

button{

background:#C8102E;
color:white;
padding:12px 20px;
border:none;
cursor:pointer;
margin-top:20px;

}

button:hover{

background:#9B0A22;

}

#resultado{

margin-top:30px;
background:white;
padding:20px;
border:1px solid #ddd;

}

pre{

white-space:pre-wrap;

}

</style>

</head>

<body>

<h1>📰 News LATAM Studio</h1>


<label>Título</label>
<input id="titulo">


<label>Categoría</label>

<select id="categoria">

<option>Geopolítica</option>

<option>América Latina</option>

<option>Conflicto</option>

<option>Actualidad</option>

<option>Reflexión</option>

<option>África</option>

</select>


<label>Fecha</label>

<input id="fecha" value="27 jun 2026">


<label>URL Imagen</label>

<input id="imagen">


<label>Resumen</label>

<textarea id="resumen"></textarea>



<label>Contenido</label>

<textarea id="contenido"></textarea>



<label>

<input type="checkbox" id="destacado">

Artículo destacado


</label>



<button onclick="generar()">

Generar artículo

</button>



<div id="resultado"></div>



<script>


function generar(){


let titulo=document.getElementById("titulo").value;


let categoria=document.getElementById("categoria").value;


let fecha=document.getElementById("fecha").value;


let imagen=document.getElementById("imagen").value;


let resumen=document.getElementById("resumen").value;


let contenido=document.getElementById("contenido").value;


let destacado=document.getElementById("destacado").checked;



contenido=contenido.split("\n\n")


.map(p=>"<p>"+p+"</p>")


.join("\n");



let codigo=`{


titulo:"${titulo}",


categoria:"${categoria}",


fecha:"${fecha}",


resumen:"${resumen}",


imagen:"${imagen}",


destacado:${destacado},



contenido:\`


${contenido}



\`


},`;


document.getElementById("resultado").innerHTML=


"<h3>Copia esto y pégalo al inicio de ARTICULOS = [</h3><pre>"+codigo+"</pre>";



}



</script>



</body>


</html>
